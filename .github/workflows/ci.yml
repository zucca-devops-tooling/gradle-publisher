name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean assemble --refresh-dependencies --info --no-daemon

  spotless:
    name: Spotless
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting
        run: ./gradlew check -x test --no-daemon

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: spotless

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --no-daemon

  publish-maven:
    name: Publish to Maven repository
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish
        shell: bash
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASS: ${{ secrets.GPG_KEY_PASS }}
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_PACKAGES_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          set -euo pipefail

          GPG_KEY_PATH="$RUNNER_TEMP/gpg-private-key.asc"
          printf '%s' "$GPG_SECRET_KEY" > "$GPG_KEY_PATH"

          ./gradlew publish --info --no-daemon \
            -Psigning.keyId="$GPG_KEY_ID" \
            -Psigning.password="$GPG_KEY_PASS" \
            -Psigning.secretKeyRingFile="$GPG_KEY_PATH" \
            -PgithubPackagesUsername="${GH_PACKAGES_USERNAME:-$GITHUB_ACTOR}" \
            -PgithubPackagesPassword="$GH_PACKAGES_TOKEN" \
            -PmavenCentralUsername="$OSSRH_USERNAME" \
            -PmavenCentralPassword="$OSSRH_PASSWORD"

  publish-gradle-plugin-portal:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest
    needs: publish-maven
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish plugins
        shell: bash
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASS: ${{ secrets.GPG_KEY_PASS }}
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          set -euo pipefail

          GPG_KEY_PATH="$RUNNER_TEMP/gpg-private-key.asc"
          printf '%s' "$GPG_SECRET_KEY" > "$GPG_KEY_PATH"

          ./gradlew publishPlugins --info --no-daemon \
            -Psigning.keyId="$GPG_KEY_ID" \
            -Psigning.password="$GPG_KEY_PASS" \
            -Psigning.secretKeyRingFile="$GPG_KEY_PATH" \
            -Pgradle.publish.key="$GRADLE_PUBLISH_KEY" \
            -Pgradle.publish.secret="$GRADLE_PUBLISH_SECRET"
